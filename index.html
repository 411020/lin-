<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行打包計畫</title>
    <?!= include('style'); ?>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>旅行打包計畫</h1>
        <p>輸入目的地城市與預計出發日期，系統會自動抓取當季平均氣溫與建議天氣，並生成打包清單。</p>
      </header>

      <main>
        <form id="travelForm" onsubmit="return handleSubmit(event)">
          <label for="destination">目的地城市</label>
          <input id="destination" name="destination" type="text" placeholder="例如：Tokyo" required />

          <label for="departureDate">預計出發日期</label>
          <input id="departureDate" name="departureDate" type="date" required />

          <button type="submit">查詢天氣與打包建議</button>
        </form>

        <section id="resultPanel" class="hidden">
          <h2>旅行建議</h2>
          <div class="result-grid">
            <div><strong>目的地</strong><span id="resultDestination"></span></div>
            <div><strong>出發日期</strong><span id="resultDate"></span></div>
            <div><strong>季節</strong><span id="resultSeason"></span></div>
            <div><strong>平均氣溫</strong><span id="resultTemperature"></span></div>
            <div><strong>天氣型態</strong><span id="resultWeather"></span></div>
            <div class="packing-block"><strong>建議打包清單</strong><ul id="resultPacking"></ul></div>
          </div>

          <div class="actions">
            <button id="saveButton" onclick="savePlan()" type="button">存入 Google Sheets</button>
            <a id="sheetLink" class="hidden" target="_blank" rel="noopener">前往已儲存的 Google Sheets</a>
          </div>
        </section>

        <div id="message" class="message"></div>
      </main>
    </div>

    <?!= include('script'); ?>
  </body>
</html>
