<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行打包計畫</title>
    <?!= include('style'); ?>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Smart Travel Planner & Weather Packer</h1>
        <p>輸入目的地城市與預計出發日期，立即產生當季天氣預測與打包清單。</p>
      </header>

      <main class="dashboard-grid">
        <section class="card input-card">
          <div class="card-header">
            <h2>Trip Planner</h2>
            <span>Destination & Departure</span>
          </div>
          <form id="travelForm" onsubmit="return handleSubmit(event)">
            <label for="destination">Destination City</label>
            <input id="destination" name="destination" type="text" placeholder="例如：Kyoto" required />

            <label for="departureDate">Departure Date</label>
            <input id="departureDate" name="departureDate" type="date" required />

            <button type="submit">Generate Plan</button>
          </form>
        </section>

        <section class="card summary-card hidden" id="resultPanel">
          <div class="card-header">
            <h2>Travel Dashboard</h2>
            <span>Weather & Packing</span>
          </div>

          <div class="summary-box">
            <div class="summary-title">Your Trip to <span id="resultDestination"></span></div>
            <div class="summary-meta">
              <div><strong>Date</strong><p id="resultDate"></p></div>
              <div><strong>Season</strong><p id="resultSeason"></p></div>
              <div><strong>Weather</strong><p id="resultWeather"></p></div>
              <div><strong>Avg Temp</strong><p id="resultTemperature"></p></div>
            </div>
          </div>

          <div class="forecast-box">
            <div class="forecast-title">Seasonal Weather Snapshot</div>
            <div class="forecast-chips">
              <span id="forecastTemp"></span>
              <span id="forecastType"></span>
            </div>
          </div>

          <div class="packing-grid">
            <div>
              <h3>Clothing</h3>
              <ul id="packingClothing"></ul>
            </div>
            <div>
              <h3>Essentials</h3>
              <ul id="packingEssentials"></ul>
            </div>
            <div>
              <h3>Electronics</h3>
              <ul id="packingElectronics"></ul>
            </div>
          </div>

          <div class="actions">
            <button id="saveButton" onclick="savePlan()" type="button">SAVE TO TRAVEL TRIPS</button>
            <a id="sheetLink" class="hidden" target="_blank" rel="noopener">Open Google Sheet</a>
          </div>
        </section>
      </main>

      <div id="message" class="message"></div>
    </div>

    <?!= include('script'); ?>
  </body>
</html>
