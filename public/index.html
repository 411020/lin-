<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅遊行程打包建議</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 24px; background: #f4f7fb; color: #20232a; }
    .container { max-width: 720px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); padding: 28px; }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 10px; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; margin-bottom: 18px; border: 1px solid #cbd5e2; border-radius: 8px; }
    button { padding: 12px 18px; border: none; border-radius: 10px; background: #2563eb; color: white; cursor: pointer; font-size: 1rem; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result, .message { margin-top: 20px; padding: 18px; border-radius: 12px; background: #eef2ff; }
    .result p { margin: 8px 0; }
    .packing-list { display: inline-block; margin-top: 12px; padding: 14px; border-radius: 12px; background: #fff; border: 1px solid #dbeafe; }
  </style>
</head>
<body>
  <div class="container">
    <h1>旅遊行程與打包清單</h1>
    <p>輸入目的地城市與預計出發日期，系統會自動查天氣並建議需要攜帶的物品。</p>

    <form id="trip-form">
      <label for="destination">目的地城市</label>
      <input id="destination" name="destination" type="text" placeholder="例如：Tokyo、Taipei" required />

      <label for="departureDate">預計出發日期</label>
      <input id="departureDate" name="departureDate" type="date" required />

      <button type="submit">產生旅遊建議</button>
    </form>

    <div id="result" class="result" style="display:none;"></div>
    <div id="message" class="message" style="display:none;"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
