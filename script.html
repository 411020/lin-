<script>
  function handleSubmit(event) {
    event.preventDefault();
    showMessage('正在查詢城市氣候資料，請稍後...', 'info');
    document.getElementById('resultPanel').classList.add('hidden');
    document.getElementById('sheetLink').classList.add('hidden');

    const destination = document.getElementById('destination').value.trim();
    const departureDate = document.getElementById('departureDate').value;

    google.script.run
      .withSuccessHandler(renderResult)
      .withFailureHandler(function (error) {
        showMessage(error.message || '查詢失敗，請檢查城市名稱或稍後再試。', 'error');
      })
      .getDestinationWeather(destination, departureDate);
  }

  function renderResult(data) {
    if (!data) {
      showMessage('沒有取得任何資料。', 'error');
      return;
    }

    document.getElementById('resultDestination').textContent = `${data.destination}${data.country ? '，' + data.country : ''}`;
    document.getElementById('resultDate').textContent = data.departureDate;
    document.getElementById('resultSeason').textContent = data.season;
    document.getElementById('resultTemperature').textContent = `${data.averageTemperatureC} °C`;
    document.getElementById('resultWeather').textContent = data.weatherType;

    const packingList = document.getElementById('resultPacking');
    packingList.innerHTML = '';
    data.packingList.forEach(function (item) {
      const li = document.createElement('li');
      li.textContent = item;
      packingList.appendChild(li);
    });

    document.getElementById('resultPanel').classList.remove('hidden');
    showMessage('已為您生成旅遊打包建議，您可以儲存至 Google Sheets。', 'success');
    window.currentTrip = data;
  }

  function savePlan() {
    const trip = window.currentTrip;
    if (!trip) {
      showMessage('尚未建立行程資料，請先查詢目的地。', 'error');
      return;
    }

    showMessage('正在儲存至 Google Sheets，請稍後...', 'info');
    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          showMessage(result.message, 'success');
          const link = document.getElementById('sheetLink');
          link.href = result.sheetUrl;
          link.textContent = '點此開啟旅遊行程 Google Sheet';
          link.classList.remove('hidden');
        } else {
          showMessage('儲存失敗，請稍後再試。', 'error');
        }
      })
      .withFailureHandler(function (error) {
        showMessage(error.message || '儲存失敗，請稍後再試。', 'error');
      })
      .saveTrip(trip);
  }

  function showMessage(text, type) {
    const message = document.getElementById('message');
    message.textContent = text;
    message.className = 'message ' + type;
  }
</script>
