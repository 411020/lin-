<style>
  body {
    font-family: 'Noto Sans TC', sans-serif;
    margin: 0;
    background: #f7f9fb;
    color: #222;
  }
  .app-shell {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 2rem;
  }
  header p {
    margin: 0;
    color: #555;
  }
  form {
    display: grid;
    gap: 16px;
    background: #fff;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.05);
  }
  label {
    font-weight: 600;
  }
  input[type='text'],
  input[type='date'] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d2dce3;
    border-radius: 10px;
    font-size: 1rem;
  }
  button {
    background: #157efb;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 14px 20px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  button:hover {
    background: #0f6fda;
  }
  .result-grid {
    display: grid;
    gap: 14px;
    margin-top: 16px;
  }
  .result-grid div {
    display: flex;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 12px;
    background: #f4f8fb;
  }
  .packing-block {
    grid-column: 1 / -1;
  }
  .packing-block ul {
    margin: 8px 0 0;
    padding-left: 20px;
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .actions a {
    color: #157efb;
    text-decoration: none;
    font-weight: 600;
  }
  .hidden {
    display: none;
  }
  .message {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 12px;
    font-weight: 600;
  }
  .message.info {
    background: #eef5ff;
    color: #1b4f9b;
  }
  .message.success {
    background: #e9f8ee;
    color: #1a6d2c;
  }
  .message.error {
    background: #ffe9e9;
    color: #991b1b;
  }
</style>
