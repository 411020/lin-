<style>
  body {
    font-family: 'Noto Sans TC', sans-serif;
    margin: 0;
    background: #f7f9fb;
    color: #222;
  }
  .app-shell {
    max-width: 1160px;
    margin: 0 auto;
    padding: 30px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    margin: 0 0 10px;
    font-size: 2.4rem;
    letter-spacing: 0.04em;
  }
  header p {
    margin: 0;
    color: #4f5d7a;
    font-size: 1rem;
  }
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1.35fr;
    gap: 24px;
    align-items: start;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 26px 70px rgba(26, 53, 98, 0.12);
    padding: 26px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 22px;
  }
  .card-header h2 {
    font-size: 1.3rem;
    margin: 0;
  }
  .card-header span {
    color: #7f8fa3;
    font-size: 0.94rem;
  }
  form {
    display: grid;
    gap: 18px;
  }
  label {
    font-weight: 700;
    color: #3f4d6a;
  }
  input[type='text'],
  input[type='date'] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #e1e7f0;
    border-radius: 16px;
    font-size: 1rem;
    background: #f8fbff;
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, #3d7efd 0%, #24c6fd 100%);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 22px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  button:hover {
    opacity: 0.96;
    transform: translateY(-1px);
  }
  button:hover {
    background: #0f6fda;
  }
  .summary-box {
    background: #f5f8ff;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .summary-title {
    font-weight: 700;
    font-size: 1.08rem;
    margin-bottom: 16px;
  }
  .summary-meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .summary-meta div {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: inset 0 0 0 1px rgba(41, 128, 253, 0.08);
  }
  .summary-meta strong {
    display: block;
    margin-bottom: 6px;
    color: #5b6c89;
    font-size: 0.92rem;
  }
  .summary-meta p {
    margin: 0;
    font-size: 1.05rem;
    color: #12233d;
    font-weight: 700;
  }
  .forecast-box {
    background: #ffffff;
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 22px;
    border: 1px solid #e9eef6;
  }
  .forecast-title {
    font-weight: 700;
    margin-bottom: 12px;
  }
  .forecast-chips {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .forecast-chips span {
    background: #eef5ff;
    padding: 10px 14px;
    border-radius: 999px;
    color: #1a4bbc;
    font-weight: 600;
  }
  .packing-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }
  .packing-grid h3 {
    margin: 0 0 12px;
    font-size: 1rem;
    color: #2d3f5e;
  }
  .packing-grid ul {
    margin: 0;
    padding-left: 18px;
    list-style: disc;
    color: #4d5f7a;
  }
  .packing-grid li {
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .actions a {
    color: #2d6ef3;
    text-decoration: none;
    font-weight: 700;
  }
  .actions a {
    color: #157efb;
    text-decoration: none;
    font-weight: 600;
  }
  .hidden {
    display: none;
  }
  .message {
    margin-top: 22px;
    padding: 16px 18px;
    border-radius: 16px;
    font-weight: 600;
  }
  .message.info {
    background: #eef5ff;
    color: #1b4f9b;
  }
  .message.success {
    background: #e9f8ee;
    color: #1a6d2c;
  }
  .message.error {
    background: #ffe9e9;
    color: #991b1b;
  }
</style>
